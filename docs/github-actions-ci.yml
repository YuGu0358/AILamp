name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install uv

      - name: Check lockfile
        run: uv lock --check

      - name: Install test dependencies
        run: python -m pip install -e ".[test]"

      - name: Run tests
        run: python -m pytest -q

      - name: Run static hardware check
        run: ailamp hardware-check

      - name: Build wheel
        run: uv build --wheel
